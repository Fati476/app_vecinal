<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Reportes - Administrador</title>

  <link rel="stylesheet" href="css/admin.css">
  <link rel="stylesheet" href="css/reportes.css">
  <link rel="stylesheet" href="css/sos.css">
  <link rel="stylesheet" href="css/incidencias.css">
  <link rel="stylesheet" href="css/chat_ia.css">

  <!-- LEAFLET -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    #mapa, #mapaEditar {
      height: 280px;
      margin-top: 10px;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<div class="topbar">
  <button class="menu-btn" onclick="toggleMenu()">☰</button>
  <h2>Reportes (Administrador)</h2>
</div>

<aside class="sidebar" id="sidebar">
  <div class="logo">Admin</div>
  <a href="admin.html">🏠 Panel</a>
  <a href="chat_admin.html" class="active">💬 Chat Comunidad</a>
  <a href="admin_solicitudes.html">📥 Solicitudes</a>
  <a href="admin_historial.html">📜 Historial</a>
  <a href="admin_reportes.html">🛠️ Reportes</a>
  <a href="incidencias_admin.html">🚨 Incidencias</a>
  <a href="admin_perfil.html">👤 Perfil</a>
  <a href="admin_dashboard.html">📊 Dashboard</a>
  <a href="login.html" class="logout">🚪 Cerrar sesión</a>
</aside>

<main class="main">

  <!-- CREAR REPORTE -->
  <div class="card">
    <h3>➕ Crear reporte</h3>

    <form id="formReporte" enctype="multipart/form-data">
      <input type="text" name="titulo" placeholder="Título" required>
      <textarea name="descripcion" placeholder="Descripción" required></textarea>

      <input type="file" name="foto" accept="image/*">

      <input type="hidden" name="lat" id="lat">
      <input type="hidden" name="lng" id="lng">

      <label>📍 Ubicación</label>
      <div id="mapa"></div>

      <button type="submit">Publicar</button>
    </form>
  </div>

  <!-- LISTA -->
  <div class="card">
    <h3>📋 Todos los reportes</h3>
    <div id="listaReportes"></div>
  </div>

</main>

<!-- MODAL EDITAR -->
<div id="modalEditar" class="modal">
  <div class="modal-content">
    <h3>✏️ Editar reporte</h3>

    <form id="formEditar" enctype="multipart/form-data">
      <input type="hidden" id="edit_id">
      <input type="hidden" id="edit_lat">
      <input type="hidden" id="edit_lng">

      <input type="text" id="edit_titulo" required>
      <textarea id="edit_descripcion" required></textarea>

      <img id="preview_foto" class="img-reporte" style="display:none">
      <input type="file" id="edit_foto" accept="image/*">

      <label>📍 Mover ubicación</label>
      <div id="mapaEditar"></div>

      <button type="submit">💾 Guardar</button>
      <button type="button" onclick="cerrarModal()">❌ Cancelar</button>
    </form>
  </div>
</div>


<button id="btnIA" class="boton-ia">🤖</button>

<!-- PANEL CHAT IA -->
<div id="panelIA" class="panel-ia oculto">
    <div class="panel-header">
        Asistente Vecinal
        <span id="cerrarIA">✖</span>
    </div>

    <div id="mensajesIA" class="panel-mensajes"></div>

    <div class="panel-input">
        <input type="text" id="inputIA" placeholder="Escribe tu mensaje...">
        <button onclick="enviarMensajeIA()">Enviar</button>
    </div>
</div>

<!-- BOTÓN SOS -->
<button id="btnSOS" title="Emergencia">🚨</button>


<!-- SOCKET.IO -->
<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

<script>
window.socket = io("https://app-vecinal.onrender.com");
console.log("🟢 Socket creado");
</script>


<!-- SCRIPTS DEL SISTEMA -->
<script src="js/chat_ia.js"></script>
<script src="js/incidencias-burbujas.js"></script>
<script src="js/sos.js"></script>
<script src="js/menu.js"></script>
<script src="js/admin_reportes.js"></script>

</body>
</html>
