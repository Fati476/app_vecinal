<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Chat Comunidad - Admin</title>

  <link rel="stylesheet" href="css/admin.css">
  <link rel="stylesheet" href="css/chat.css">
</head>

<body>

<!-- 🔹 TOPBAR -->
<div class="topbar">
  <button class="menu-btn" onclick="toggleMenu()">☰</button>
  <h2>💬 Comunidad General</h2>
</div>

<!-- 🔹 SIDEBAR (NO TOCADO 👌) -->
<aside class="sidebar" id="sidebar">
  <div class="logo">ConectaVecinos</div>

  <a href="admin.html">🏠 Panel</a>
  <a href="admin_solicitudes.html">📥 Solicitudes</a>
  <a href="admin_historial.html">📜 Historial</a>
  <a href="admin_reportes.html">🛠️ Reportes</a>
  <a href="incidencias_admin.html">🚨 Incidencias</a>
  <a href="chat_admin.html" class="active">💬 Chat Comunidad</a>
  <a href="admin_perfil.html">👤 Perfil</a>
  <a href="admin_dashboard.html">📊 Dashboard</a>
  <a href="login.html" class="logout">🚪 Cerrar sesión</a>
</aside>

<!-- 🔹 CONTENIDO -->
<main class="main">

  <!-- 🔥 HEADER PRO -->
  <section class="chat-top">
    <div class="acciones-chat">
      <button class="btn-chat" onclick="irGrupo()">💬 Grupo General</button>
      <button class="btn-chat" onclick="verUsuarios()">🟢 Usuarios</button>
    </div>

    <div id="estadoUsuario" class="estado-online">Conectando...</div>
  </section>

  <!-- 🔥 PANEL USUARIOS -->
  <div id="listaUsuarios" class="lista-usuarios oculto"></div>

  <!-- 🔥 CHAT -->
  <section class="chat-section">

    <div id="escribiendo" class="escribiendo"></div>

    <div id="chat" class="chat-messages"></div>

    <!-- 🔥 PREVIEW IMAGEN -->
    <div id="previewContainer" class="preview-container"></div>

    <!-- 🔥 INPUT PRO -->
    <div class="chat-input">

      <button class="btn-icon" onclick="document.getElementById('imagenInput').click()">📸</button>
      <input type="file" id="imagenInput" accept="image/*" hidden>

      <input id="mensaje" type="text" placeholder="Escribe un mensaje...">

      <button class="btn-enviar" onclick="enviarMensaje()">➤</button>
    </div>

  </section>

</main>

<script>
function verUsuarios() {
  const contenedor = document.getElementById("listaUsuarios");

  contenedor.classList.toggle("oculto");

  contenedor.innerHTML = `
    <div class="msg-proximamente">
      🟢 Usuarios conectados aparecerán aquí
    </div>
  `;
}
</script>

<script src="js/menu.js"></script>
<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
<script src="js/chat_grupo.js"></script>

</body>
</html>
