<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Chat Comunidad - Admin</title>

  <link rel="stylesheet" href="css/admin.css">
  <link rel="stylesheet" href="css/chat.css">
</head>

<body>

<!-- 🔹 TOPBAR -->
<div class="topbar">
  <button class="menu-btn" onclick="toggleMenu()">☰</button>
  <h2>💬 Comunidad General</h2>
</div>

<!-- 🔹 SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <div class="logo">ConectaVecinos</div>

  <a href="admin.html">🏠 Panel</a>
  <a href="admin_solicitudes.html">📥 Solicitudes</a>
  <a href="admin_historial.html">📜 Historial</a>
  <a href="admin_reportes.html">🛠️ Reportes</a>
  <a href="incidencias_admin.html">🚨 Incidencias</a>
  <a href="chat_admin.html" class="active">💬 Chat Comunidad</a>
  <a href="admin_perfil.html">👤 Perfil</a>
  <a href="admin_dashboard.html">📊 Dashboard</a>
  <a href="login.html" class="logout">🚪 Cerrar sesión</a>
</aside>

<!-- 🔹 CONTENIDO -->
<main class="main">

  <!-- 🔥 BOTONES SUPERIORES (igual que vecino) -->
  <section class="info-top">
    <button class="btn-chat" onclick="irGrupo()">💬 Grupo General</button>
    <button class="btn-chat" onclick="verUsuarios()">🟢 Usuarios conectados</button>
  </section>

  <!-- 🔥 LISTA DE USUARIOS (mensaje temporal) -->
  <div id="listaUsuarios" class="lista-usuarios"></div>

  <!-- CHAT -->
  <section class="chat-section">

    <header class="chat-header">
      <h3>Comunidad General</h3>
      <span id="estadoUsuario">Conectando...</span>
    </header>

    <div id="escribiendo" class="escribiendo"></div>
    <div id="chat" class="chat-messages"></div>

    <div class="chat-input">
      <input id="mensaje" type="text" placeholder="Escribe un mensaje...">
      <button onclick="enviarMensaje()">Enviar</button>
    </div>

  </section>

</main>

<script>
function verUsuarios() {
  const contenedor = document.getElementById("listaUsuarios");

  contenedor.innerHTML = `
    <div class="msg-proximamente">
      🔧 Esta función se implementará más adelante...
    </div>
  `;

  contenedor.style.display = "block";
  contenedor.style.opacity = "1";
}

</script>

<script src="js/menu.js"></script>
<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
<script src="js/chat_grupo.js"></script>

<!-- 🔥 FUNCIÓN agregar mensaje temporal -->

</body>
</html>
